version: '3.8'

services:
  app:
    build: .
    container_name: nota-reimburse
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
    volumes:
      - ./lib/google-credentials.json:/app/lib/google-credentials.json:ro

  nginx:
    image: nginx:alpine
    container_name: nota-reimburse-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    profiles:
      - with-nginx